<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator • Alex Lazar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .display {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-500 rounded-2xl flex items-center justify-center text-xl font-bold text-black">
                    <i class="fas fa-key"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-semibold tracking-tighter">Generator</h1>
                </div>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-700">
            
            <!-- Generated Password -->
            <div class="bg-zinc-950 border border-zinc-700 rounded-2xl p-5 mb-8">
                <div id="password" class="display text-3xl font-semibold tracking-widest text-center break-all min-h-[52px] py-2">
                    Click Generate
                </div>
            </div>

            <!-- Length -->
            <div class="mb-8">
                <div class="flex justify-between text-sm mb-2">
                    <span>Length</span>
                    <span id="length-value" class="font-medium text-blue-400">16</span>
                </div>
                <input type="range" id="length-slider" 
                       min="6" max="32" value="16"
                       oninput="updateLength(this.value)"
                       class="w-full accent-blue-500">
            </div>

            <!-- Options -->
            <div class="space-y-4 mb-8">
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-3">
                        <input type="checkbox" id="upper" checked class="w-5 h-5 accent-blue-500">
                        <span>Uppercase (ABC)</span>
                    </label>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-3">
                        <input type="checkbox" id="lower" checked class="w-5 h-5 accent-blue-500">
                        <span>Lowercase (abc)</span>
                    </label>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-3">
                        <input type="checkbox" id="numbers" checked class="w-5 h-5 accent-blue-500">
                        <span>Numbers (123)</span>
                    </label>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-3">
                        <input type="checkbox" id="symbols" class="w-5 h-5 accent-blue-500">
                        <span>Symbols (!@#)</span>
                    </label>
                </div>
            </div>

            <!-- Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="generatePassword()" 
                        class="bg-blue-500 hover:bg-blue-600 text-black font-semibold py-5 rounded-3xl text-lg">
                    GENERATE
                </button>
                <button onclick="copyPassword()" 
                        class="bg-zinc-800 hover:bg-zinc-700 font-semibold py-5 rounded-3xl text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-copy"></i>
                    COPY
                </button>
            </div>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-8">
            Made by Alex Lazar
        </div>
    </div>

    <script>
        // variables for my password generator
        const passwordDisplay = document.getElementById("password");
        const lengthSlider = document.getElementById("length-slider");
        const lengthValue = document.getElementById("length-value");

        function updateLength(val) {
            lengthValue.textContent = val;
        }

        function getRandomChar(charset) {
            return charset[Math.floor(Math.random() * charset.length)];
        }

        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            
            const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lower = "abcdefghijklmnopqrstuvwxyz";
            const numbers = "0123456789";
            const symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?";
            
            let characters = "";
            let password = "";
            
            // add selected character types
            if (document.getElementById("upper").checked) characters += upper;
            if (document.getElementById("lower").checked) characters += lower;
            if (document.getElementById("numbers").checked) characters += numbers;
            if (document.getElementById("symbols").checked) characters += symbols;
            
            // make sure we have at least one type
            if (characters === "") {
                characters = lower + numbers;
            }
            
            // generate the password
            for (let i = 0; i < length; i++) {
                password += getRandomChar(characters);
            }
            
            passwordDisplay.textContent = password;
        }

        function copyPassword() {
            const passwordText = passwordDisplay.textContent;
            
            if (passwordText === "Click Generate" || passwordText === "") {
                alert("Generate a password first!");
                return;
            }
            
            navigator.clipboard.writeText(passwordText).then(() => {
                const originalText = passwordDisplay.textContent;
                passwordDisplay.textContent = "COPIED! ✅";
                
                setTimeout(() => {
                    passwordDisplay.textContent = originalText;
                }, 1500);
            });
        }

        // keyboard shortcut
        document.addEventListener("keydown", function(e) {
            if (e.key === "g" || e.key === "G") {
                generatePassword();
            }
        });

        // generate one password when page loads
        window.onload = function() {
            generatePassword();
            console.log("password generator ready");
        };
    </script>
</body>
</html>
